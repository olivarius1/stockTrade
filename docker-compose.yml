services:
  backend:
    build: ./backend
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/valuation.db
      - REDIS_URL=redis://redis:6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - ./backend/data:/app/data
      - ./backend/output:/app/output
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  redis:
    image: m.daocloud.io/docker.io/library/redis:7.0-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

  celery-worker:
    build: ./backend
    command: celery -A app.services.scheduler.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=sqlite:///./data/valuation.db
      - REDIS_URL=redis://redis:6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - ./backend/data:/app/data
      - ./backend/output:/app/output
    depends_on:
      - redis
      - backend
    restart: unless-stopped

  celery-beat:
    build: ./backend
    command: celery -A app.services.scheduler.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=sqlite:///./data/valuation.db
      - REDIS_URL=redis://redis:6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - ./backend/data:/app/data
      - ./backend/output:/app/output
    depends_on:
      - redis
      - backend
    restart: unless-stopped

volumes:
  redis_data:
